name: Ruby
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.2'
          - '3.3'
          - '3.4'
          - '4.0'
          - 'head'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install PTY integration dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux vim vttest
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install browser automation dependencies
        run: npm install --no-save playwright && npx playwright install --with-deps chromium
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake
      - name: Verify package contents
        run: bundle exec rake package:verify_contents

  windows:
    runs-on: windows-latest
    name: Windows PTY smoke
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Run Windows PTY specs
        run: bundle exec rspec spec/pty/conpty_spec.rb
